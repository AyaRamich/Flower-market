{% extends 'base.html' %}
{% block title %}Inscription — FloralShop{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">🌷</span>
            <h2>Créer un compte</h2>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Rôle</label>
                <select name="role" id="role-select" onchange="toggleShopName()">
                    <option value="client">Client</option>
                    <option value="seller">Vendeur</option>
                    <option value="delivery">Livreur</option>
                </select>
            </div>

            <!-- Champ visible seulement pour les vendeurs -->
            <div class="form-group" id="shop-name-group" style="display:none">
                <label>Nom de votre boutique</label>
                <input type="text" name="shop_name" placeholder="Ma Boutique Florale">
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>Confirmer le mot de passe</label>
                <input type="password" name="password2" required>
            </div>

            <button type="submit" class="btn-primary btn-full">Créer mon compte</button>
        </form>

        <p class="auth-footer">
            Déjà un compte ? <a href="{% url 'login' %}">Se connecter</a>
        </p>
    </div>
</div>

{% block extra_js %}
<script>
function toggleShopName() {
    const role = document.getElementById('role-select').value;
    const group = document.getElementById('shop-name-group');
    group.style.display = role === 'seller' ? 'block' : 'none';
}
</script>
{% endblock %}
{% endblock %}
