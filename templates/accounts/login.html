{% extends 'base.html' %}
{% block title %}Connexion — FloralShop{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">🌸</span>
            <h2>Connexion</h2>
            <p>Bienvenue sur FloralShop</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" placeholder="votre_username" required autofocus>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary btn-full">Se connecter</button>
        </form>

        <p class="auth-footer">
            Pas encore de compte ? <a href="{% url 'register' %}">S'inscrire</a>
        </p>
    </div>
</div>
{% endblock %}
